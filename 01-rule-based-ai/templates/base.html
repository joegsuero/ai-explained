<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Credit Decision System{% endblock %}</title>
    <style>
      :root {
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --border: #e0e0e0;
        --bg: #ffffff;
        --bg-secondary: #f9f9f9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-primary);
        background: var(--bg);
        padding: 24px;
        max-width: 800px;
        margin: 0 auto;
      }

      .container {
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 4px;
      }

      .header p {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .content {
        padding: 24px;
      }

      h2 {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 0;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--text-secondary);
      }

      input,
      select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 3px;
        font-size: 13px;
        font-family: inherit;
        background: var(--bg);
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #999;
      }

      .submit-btn {
        display: block;
        width: 100%;
        padding: 10px;
        background: var(--text-primary);
        color: white;
        border: none;
        border-radius: 3px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .submit-btn:hover {
        opacity: 0.9;
      }

      .rules-section {
        margin-top: 32px;
        padding: 20px;
        background: var(--bg-secondary);
        border-radius: 3px;
      }

      .rules-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .rule-item {
        font-size: 12px;
      }

      .rule-item h4 {
        font-weight: 500;
        margin-bottom: 4px;
      }

      .rule-item p {
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
